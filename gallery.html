<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | SAI PHOTOGRAPHY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('gallery/gallery-1.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .gallery-filter {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 0.8rem 1.8rem;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: var(--transition-smooth);
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 4/5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition-smooth);
        }
        .gallery-overlay i {
            color: var(--accent-gold);
            font-size: 2rem;
            transform: scale(0.5);
            transition: var(--transition-smooth);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        .gallery-item:hover .gallery-overlay i {
            transform: scale(1);
        }

        /* Modal / Lightbox */
        #lightbox {
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border: 1px solid var(--border-color);
        }
        #lightbox .close {
            position: absolute;
            top: 40px; right: 40px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky">
        <div class="container">
            <a href="index.html" class="logo"><img src="gallery/logo.png" alt="Sai Photography" class="logo-img">SAI <span>PHOTOGRAPHY</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="gallery.html" class="active">Gallery</a>
                <a href="pricing.html">Pricing</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="mobile-nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="gallery-hero">
        <div class="container">
            <p style="text-transform: uppercase; letter-spacing: 5px; color: var(--accent-gold); margin-bottom: 10px;">Our Portfolio</p>
            <h1 style="font-size: 3.5rem;">VISUAL JOURNEY</h1>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="gallery-filter">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="wedding">Wedding</button>
                <button class="filter-btn" data-filter="events">Events</button>
                <button class="filter-btn" data-filter="baby">Baby Shoot</button>
                <button class="filter-btn" data-filter="outdoor">Outdoor</button>
            </div>

            <div class="gallery-grid">
                <!-- Wedding -->
                <div class="gallery-item" data-category="wedding">
                    <img src="gallery/wedding-thumb.png" alt="Wedding">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <div class="gallery-item" data-category="wedding">
                    <img src="gallery/gallery-1.png" alt="Wedding">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <!-- Events -->
                <div class="gallery-item" data-category="events">
                    <img src="gallery/event-thumb.png" alt="Event">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <div class="gallery-item" data-category="events">
                    <img src="gallery/gallery-2.png" alt="Event">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <!-- Baby Shoot -->
                <div class="gallery-item" data-category="baby">
                    <img src="gallery/baby-thumb.png" alt="Baby">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <div class="gallery-item" data-category="baby">
                    <img src="gallery/gallery-3.png" alt="Baby">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <!-- Outdoor -->
                <div class="gallery-item" data-category="outdoor">
                    <img src="gallery/gallery-4.png" alt="Outdoor">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
                <div class="gallery-item" data-category="outdoor">
                    <img src="gallery/about-philosophy.png" alt="Outdoor">
                    <div class="gallery-overlay"><i class="fas fa-expand"></i></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close">&times;</span>
        <img src="" id="lightbox-img">
    </div>

    <!-- Footer -->
    <footer>
        <div class="container footer-bottom">
            &copy; 2026 SAI PHOTOGRAPHY. All Rights Reserved.
        </div>
    </footer>

    <script>
        // Gallery Filter
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                galleryItems.forEach(item => {
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close');

        galleryItems.forEach(item => {
            item.addEventListener('click', () => {
                const imgSrc = item.querySelector('img').src;
                lightboxImg.src = imgSrc;
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            });
        });

        closeBtn.addEventListener('click', () => {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
